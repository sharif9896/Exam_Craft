<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Preloader Container */
#preloader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background-color: #ffffff; /* Match Aevis white background */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1); /* Slide up effect */
}

/* Loading Text Styling */
.loading-text {
    font-family: 'Arial', sans-serif;
    font-size: 2.5rem;
    font-weight: bold;
    color: #333;
    display: flex;
    gap: 2px;
}

/* Animation for individual letters */
.loading-text span {
    display: inline-block;
    animation: wave 1.5s infinite ease-in-out;
}

/* Staggered Delay for each letter */
.loading-text span:nth-child(1) { animation-delay: 0.1s; }
.loading-text span:nth-child(2) { animation-delay: 0.2s; }
.loading-text span:nth-child(3) { animation-delay: 0.3s; }
.loading-text span:nth-child(4) { animation-delay: 0.4s; }
.loading-text span:nth-child(5) { animation-delay: 0.5s; }
.loading-text span:nth-child(6) { animation-delay: 0.6s; }
.loading-text span:nth-child(7) { animation-delay: 0.7s; }

/* The "Wavy" Keyframe */
@keyframes wave {
    0%, 100% {
        transform: translateY(0);
        opacity: 0.3;
    }
    50% {
        transform: translateY(-15px);
        opacity: 1;
        color: #007bff; /* Optional: adds a blue tint like their branding */
    }
}

/* Slide-up class triggered by JS */
.loader-hidden {
    transform: translateY(-100%);
}
    </style>
</head>
<body>
    <div id="preloader">
    <div class="loading-text">
        <span>L</span>
        <span>o</span>
        <span>a</span>
        <span>d</span>
        <span>i</span>
        <span>n</span>
        <span>g</span>
        <div class="dot-container">
            <span class="dot">.</span>
            <span class="dot">.</span>
            <span class="dot">.</span>
        </div>
    </div>
</div>

<div id="content" style="display: none;">
    <h1>Welcome to My Website</h1>
    <p>This is the content that appears after the animation.</p>
</div>
<script>
    window.addEventListener("load", function() {
    const preloader = document.getElementById("preloader");
    const content = document.getElementById("content");

    // Small timeout to ensure the user sees the animation
    setTimeout(() => {
        // Slide the preloader up
        preloader.classList.add("loader-hidden");
        
        // Show the actual content
        content.style.display = "block";

        // Remove the preloader from DOM after transition finishes
        setTimeout(() => {
            preloader.style.display = "none";
        }, 800); 
    }, 2000); // 2 seconds delay
});
</script>
</body>
</html>
